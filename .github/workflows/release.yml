name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.13"

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    env:
      ASSET_NAME: rehearse-linux-x86_64
      ARCHIVE_NAME: rehearse-linux-x86_64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          git fetch origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install "$PYTHON_VERSION"

      - name: Install dependencies
        run: uv sync --dev --frozen --python "$PYTHON_VERSION"

      - name: Build executable
        run: uv run pyinstaller --clean --noconfirm rehearse.spec

      - name: Package archive
        run: |
          mkdir -p "release/${ASSET_NAME}"
          cp dist/rehearse "release/${ASSET_NAME}/"
          cp README.md LICENSE "release/${ASSET_NAME}/"
          tar -czf "${ARCHIVE_NAME}" -C release "${ASSET_NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error
          archive: false

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --generate-notes
